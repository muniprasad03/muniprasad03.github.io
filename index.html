<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MPC Tech</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
    }

    header {
      background: #0d6efd;
      color: white;
      padding: 20px;
    }

    h1 {
      margin: 0;
    }

    .container {
      margin-top: 40px;
    }

    .card {
      display: inline-block;
      margin: 15px;
      padding: 20px;
      width: 220px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    a {
      text-decoration: none;
      color: #0d6efd;
      font-weight: bold;
    }

    footer {
      margin-top: 50px;
      padding: 15px;
      background: #eee;
    }
  </style>
</head>

<body>

  <header>
    <h1>🚀 MPC Tech</h1>
    <p>My Projects & Portfolio</p>
  </header>

  <div class="container">

   <div class="card"> 
     <h3>My Website</h3> 
     <p>Static HTML project hosted on GitHub Pages</p> 
     <a href="/my-website" class="btn">Open</a> 
   </div>

    <div class="card">
      <h3>dotnet-interview</h3>
      <p>Dotnet Interview</p>
      <a href="/dotnet-interview">Open</a>
    </div>

  </div>

  <footer>
    <p>© 2026 MPC Tech</p>
  </footer>

</body>
</html>
